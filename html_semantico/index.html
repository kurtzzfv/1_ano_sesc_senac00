<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Semântco</title>
    <link rel="stylesheet" href="style/style.css">
</head>
 
<body class="container-principal">
    <header class="cabecalho">
        <h1>Header (Cabeçalho)</h1>
    </header>
 
    <main class="conteudo-principal">
        <nav class="menu-navegacao">
            <h1 class="text-vertical exercicio-1">Nav (Menu de navegação)</h1>
        </nav>
 
        <section class="sessao-principal">
            <div class="article-div">
                <article class="article-1">
                    <h1>Article 1</h1>
                </article>
                <article class="article-2">
                    <h1>article 2</h1>
                </article>
                <article class="Raphael">
                    <h1>Article 3</h1>
                </article>
            </div>
 
            <div>
                <time class="Luiz" datetime="2026-05-25">25 de Maio de 2026</time>
                <figure class="figura">
                    <img class="imagem" src="assets/image/image.png" alt="Catedral do centro de São José dos Pinhas">
                    <figcaption class="Leo">Foto de vista aerea da catedral do centro de São José dos Pnhais - PR.</figcaption>
                    <p>Lorem ipsum dolor sit amet <mark class="Kruger">consectetur</mark> adipiscing elit.</p>
                </figure>
            </div>
 
 
        </section>
       
        <aside class="anuncio">
            <h1 class="text-vertical">Aside (Anúncios, links secundarios, etc...)</h1>
        </aside>
    </main>
 
    <footer class="rodape">
        <h1>Footer (Rodapé)</h1>
        <address class="Arthur">teste@testando.com</address>
    </footer>
</body>
</html>
